services:
  missing-sequel-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: missing-sequel-api
    restart: unless-stopped
    ports:
      - "3002:3002"
    volumes:
      - sequel-api-data:/app/data
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3002
      - DB_PATH=/app/data/sequel-api.db
      - MAL_CLIENT_ID=${MAL_CLIENT_ID}
      - ANILIST_CLIENT_ID=${ANILIST_CLIENT_ID}
      - ANILIST_CLIENT_SECRET=${ANILIST_CLIENT_SECRET}
      - API_KEY=${API_KEY}
      - APP_ID=${APP_ID:-anymex}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY}
    networks:
      - sequel-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  sequel-api-data:
    driver: local

networks:
  sequel-net:
    driver: bridge
